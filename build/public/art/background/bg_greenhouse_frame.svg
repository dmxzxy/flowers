<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1400" viewBox="0 0 800 1400" preserveAspectRatio="xMidYMin slice">
  <defs>
    <!-- 温室玻璃：淡绿色半透明，真实玻璃质感 -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8E6C9" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#E8F5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#DCEDC8" stop-opacity="0.30"/>
    </linearGradient>
    <!-- 天花板玻璃：稍深的绿色调 -->
    <linearGradient id="glassCeiling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.30"/>
      <stop offset="40%" stop-color="#C8E6C9" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#E8F5E9" stop-opacity="0.25"/>
    </linearGradient>
    <!-- 地面 -->
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BCAAA4"/>
      <stop offset="30%" stop-color="#A1887F"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
    <!-- 金属框（暖化铁锈色） -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D9E8F"/>
      <stop offset="100%" stop-color="#6D7E6F"/>
    </linearGradient>
    <!-- 木质 -->
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <!-- 室内暖色氛围光（从底部和两侧向内渐浓） -->
    <radialGradient id="ambientWarm" cx="50%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#F5E6C8" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#EDDBBD" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4C4A8" stop-opacity="0.08"/>
    </radialGradient>
    <!-- 顶部暗角（略暗，让天花板不那么刺眼） -->
    <linearGradient id="topDim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D7D5F" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#5D7D5F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#5D7D5F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!--
    室内视角：站在温室内部，稍仰头。
    透视消失点 VP ≈ (400, 180)
    玻璃屋顶在上方，两侧玻璃墙向远方收窄，
    下方是温室地面（花盆在此区域上方的 UI 层）。
  -->

  <!-- ========== 玻璃天花板（透视网格） ========== -->
  <!-- 外框：梯形天花板轮廓 -->
  <polygon points="0,0 800,0 660,340 140,340" fill="url(#glassCeiling)"/>
  <!-- 天花板绿色遮罩（增强玻璃质感） -->
  <polygon points="0,0 800,0 660,340 140,340" fill="#A5D6A7" opacity="0.08"/>

  <!-- 纵向龙骨（从顶部向消失点汇聚） -->
  <line x1="0"   y1="0" x2="140" y2="340" stroke="#6D7E6F" stroke-width="4.5" opacity="0.85"/>
  <line x1="200" y1="0" x2="244" y2="340" stroke="#7D8E7F" stroke-width="3" opacity="0.75"/>
  <line x1="400" y1="0" x2="400" y2="340" stroke="#6D7E6F" stroke-width="3.5" opacity="0.8"/>
  <line x1="600" y1="0" x2="556" y2="340" stroke="#7D8E7F" stroke-width="3" opacity="0.75"/>
  <line x1="800" y1="0" x2="660" y2="340" stroke="#6D7E6F" stroke-width="4.5" opacity="0.85"/>

  <!-- 横向龙骨 -->
  <line x1="18"  y1="45"  x2="782" y2="45"  stroke="#8D9E8F" stroke-width="2.5" opacity="0.55"/>
  <line x1="40"  y1="100" x2="760" y2="100" stroke="#8D9E8F" stroke-width="2.5" opacity="0.6"/>
  <line x1="68"  y1="165" x2="732" y2="165" stroke="#8D9E8F" stroke-width="3" opacity="0.65"/>
  <line x1="100" y1="240" x2="700" y2="240" stroke="#8D9E8F" stroke-width="3" opacity="0.7"/>
  <line x1="126" y1="300" x2="674" y2="300" stroke="#8D9E8F" stroke-width="3" opacity="0.75"/>

  <!-- 天花板中脊（加粗主梁） -->
  <line x1="400" y1="0" x2="400" y2="340" stroke="#5D6D5F" stroke-width="6" opacity="0.9"/>

  <!-- 天花板顶部暗色覆盖（柔化天空亮度） -->
  <polygon points="0,0 800,0 660,340 140,340" fill="url(#topDim)"/>

  <!-- 天花板玻璃反光 -->
  <line x1="250" y1="50" x2="310" y2="150" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  <line x1="520" y1="80" x2="490" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M180 120 Q220 95 260 115" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/>
  <!-- 更多反光条 -->
  <line x1="150" y1="200" x2="180" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="620" y1="140" x2="600" y2="250" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- ========== 天花板下沿横梁（加宽加厚） ========== -->
  <rect x="130" y="330" width="540" height="20" fill="url(#wood)" rx="3"/>
  <rect x="130" y="350" width="540" height="5" fill="rgba(0,0,0,0.08)"/>
  <!-- 左右延伸到边 -->
  <polygon points="0,0 140,330 140,350 0,10" fill="url(#wood)" opacity="0.75"/>
  <polygon points="800,0 660,330 660,350 800,10" fill="url(#wood)" opacity="0.75"/>

  <!-- ========== 左侧玻璃墙 ========== -->
  <g>
    <polygon points="0,10 140,350 140,900 0,1100" fill="url(#glass)"/>
    <!-- 额外绿色遮罩 -->
    <polygon points="0,10 140,350 140,900 0,1100" fill="#A5D6A7" opacity="0.06"/>
    <!-- 竖直金属框 -->
    <line x1="0" y1="10" x2="0" y2="1100" stroke="#5D6D5F" stroke-width="6"/>
    <line x1="140" y1="350" x2="140" y2="900" stroke="#5D6D5F" stroke-width="4"/>
    <!-- 纵向中线 -->
    <line x1="70" y1="180" x2="70" y2="1000" stroke="#7D8E7F" stroke-width="2.5" opacity="0.6"/>
    <!-- 横线 -->
    <line x1="0" y1="450" x2="140" y2="450" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="580" x2="140" y2="575" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="730" x2="140" y2="710" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="900" x2="140" y2="860" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <!-- 玻璃反光 -->
    <line x1="25" y1="400" x2="50" y2="600" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <line x1="95" y1="500" x2="110" y2="700" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  </g>

  <!-- ========== 右侧玻璃墙 ========== -->
  <g>
    <polygon points="800,10 660,350 660,900 800,1100" fill="url(#glass)"/>
    <polygon points="800,10 660,350 660,900 800,1100" fill="#A5D6A7" opacity="0.06"/>
    <line x1="800" y1="10" x2="800" y2="1100" stroke="#5D6D5F" stroke-width="6"/>
    <line x1="660" y1="350" x2="660" y2="900" stroke="#5D6D5F" stroke-width="4"/>
    <line x1="730" y1="180" x2="730" y2="1000" stroke="#7D8E7F" stroke-width="2.5" opacity="0.6"/>
    <line x1="660" y1="450" x2="800" y2="450" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="660" y1="575" x2="800" y2="580" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="660" y1="710" x2="800" y2="730" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="660" y1="860" x2="800" y2="900" stroke="#7D8E7F" stroke-width="2" opacity="0.5"/>
    <line x1="750" y1="420" x2="725" y2="620" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <line x1="690" y1="520" x2="700" y2="720" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  </g>

  <!-- ========== 温室地面 ========== -->
  <polygon points="0,1100 140,900 660,900 800,1100 800,1400 0,1400" fill="url(#floor)"/>

  <!-- 地面与墙体交界线（木质踢脚线） -->
  <line x1="140" y1="900" x2="660" y2="900" stroke="#6D4C41" stroke-width="7"/>
  <line x1="0" y1="1100" x2="140" y2="900" stroke="#6D4C41" stroke-width="5"/>
  <line x1="800" y1="1100" x2="660" y2="900" stroke="#6D4C41" stroke-width="5"/>

  <!-- 地砖纹理 -->
  <g stroke="#9E8E82" stroke-width="0.8" opacity="0.3">
    <line x1="80"  y1="960"  x2="720" y2="960"/>
    <line x1="50"  y1="1030" x2="750" y2="1030"/>
    <line x1="25"  y1="1110" x2="775" y2="1110"/>
    <line x1="0"   y1="1200" x2="800" y2="1200"/>
    <line x1="0"   y1="1300" x2="800" y2="1300"/>
    <line x1="260" y1="900" x2="200" y2="1400"/>
    <line x1="400" y1="900" x2="400" y2="1400"/>
    <line x1="540" y1="900" x2="600" y2="1400"/>
  </g>

  <!-- 地面边缘高光 -->
  <line x1="140" y1="902" x2="660" y2="902" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>

  <!-- ========== 室内暖色氛围光 ========== -->
  <rect width="800" height="1400" fill="url(#ambientWarm)"/>

  <!-- ========== 装饰：两侧墙边绿植（更丰富更大） ========== -->
  <!-- 左墙脚 -->
  <g opacity="0.6" transform="translate(60,860)">
    <ellipse cx="0" cy="5" rx="20" ry="12" fill="#8D6E63"/>
    <ellipse cx="-8" cy="-12" rx="12" ry="20" fill="#66BB6A" transform="rotate(-20)"/>
    <ellipse cx="8" cy="-10" rx="10" ry="18" fill="#81C784" transform="rotate(15)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="14" fill="#4CAF50" transform="rotate(5)"/>
  </g>
  <!-- 左墙中部（爬藤） -->
  <g opacity="0.35" transform="translate(40,650)">
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#81C784" transform="rotate(-10)"/>
    <ellipse cx="12" cy="-5" rx="6" ry="10" fill="#66BB6A" transform="rotate(15)"/>
    <ellipse cx="-5" cy="15" rx="7" ry="11" fill="#A5D6A7" transform="rotate(-5)"/>
  </g>
  <!-- 右墙脚 -->
  <g opacity="0.6" transform="translate(740,860)">
    <ellipse cx="0" cy="5" rx="20" ry="12" fill="#8D6E63"/>
    <ellipse cx="-7" cy="-12" rx="10" ry="18" fill="#81C784" transform="rotate(-10)"/>
    <ellipse cx="7" cy="-10" rx="12" ry="20" fill="#66BB6A" transform="rotate(10)"/>
    <ellipse cx="0" cy="-16" rx="7" ry="13" fill="#4CAF50" transform="rotate(-5)"/>
  </g>
  <!-- 右墙中部（爬藤） -->
  <g opacity="0.35" transform="translate(760,670)">
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#81C784" transform="rotate(10)"/>
    <ellipse cx="-10" cy="-3" rx="6" ry="10" fill="#66BB6A" transform="rotate(-15)"/>
    <ellipse cx="5" cy="12" rx="7" ry="11" fill="#A5D6A7" transform="rotate(5)"/>
  </g>

  <!-- ========== 装饰：天花板上的悬挂植物（更多、更丰满） ========== -->
  <g opacity="0.5">
    <!-- 左侧悬挂 -->
    <line x1="260" y1="340" x2="260" y2="395" stroke="#6D4C41" stroke-width="2"/>
    <ellipse cx="260" cy="400" rx="18" ry="11" fill="#8D6E63"/>
    <ellipse cx="252" cy="390" rx="14" ry="18" fill="#66BB6A"/>
    <ellipse cx="268" cy="392" rx="12" ry="16" fill="#81C784"/>
    <ellipse cx="260" cy="384" rx="10" ry="12" fill="#4CAF50" opacity="0.7"/>
    <!-- 下垂藤蔓 -->
    <path d="M248 408 Q244 430 250 445" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.6"/>
    <path d="M272 406 Q278 425 274 440" fill="none" stroke="#81C784" stroke-width="1.5" opacity="0.5"/>
  </g>
  <g opacity="0.5">
    <!-- 右侧悬挂 -->
    <line x1="540" y1="340" x2="540" y2="390" stroke="#6D4C41" stroke-width="2"/>
    <ellipse cx="540" cy="395" rx="16" ry="10" fill="#8D6E63"/>
    <ellipse cx="533" cy="386" rx="12" ry="16" fill="#81C784"/>
    <ellipse cx="547" cy="388" rx="11" ry="14" fill="#66BB6A"/>
    <ellipse cx="540" cy="380" rx="9" ry="11" fill="#4CAF50" opacity="0.7"/>
    <path d="M528 403 Q525 420 530 435" fill="none" stroke="#81C784" stroke-width="1.5" opacity="0.6"/>
    <path d="M552 402 Q556 418 552 432" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- 中间偏左额外悬挂 -->
  <g opacity="0.35">
    <line x1="350" y1="340" x2="350" y2="375" stroke="#6D4C41" stroke-width="1.5"/>
    <ellipse cx="350" cy="380" rx="12" ry="8" fill="#8D6E63"/>
    <ellipse cx="345" cy="373" rx="9" ry="12" fill="#81C784"/>
    <ellipse cx="355" cy="374" rx="8" ry="11" fill="#A5D6A7"/>
    <path d="M342 388 Q340 400 344 408" fill="none" stroke="#81C784" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- 中间偏右额外悬挂 -->
  <g opacity="0.35">
    <line x1="460" y1="340" x2="460" y2="372" stroke="#6D4C41" stroke-width="1.5"/>
    <ellipse cx="460" cy="377" rx="11" ry="7" fill="#8D6E63"/>
    <ellipse cx="455" cy="370" rx="8" ry="11" fill="#66BB6A"/>
    <ellipse cx="465" cy="371" rx="7" ry="10" fill="#81C784"/>
    <path d="M468 384 Q472 396 469 405" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
