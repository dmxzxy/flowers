<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1400" viewBox="0 0 800 1400">
  <defs>
    <!-- 天空渐变：柔和的蓝→白 -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="35%" stop-color="#A8DCEF"/>
      <stop offset="70%" stop-color="#D4EEF7"/>
      <stop offset="100%" stop-color="#EDF7FC"/>
    </linearGradient>
  </defs>

  <!-- 天空整片 -->
  <rect width="800" height="1400" fill="url(#sky)"/>

  <!-- 太阳：暖金色光晕 -->
  <circle cx="650" cy="120" r="80" fill="#FFF3C4" opacity="0.5"/>
  <circle cx="650" cy="120" r="50" fill="#FFE88A" opacity="0.7"/>
  <circle cx="650" cy="120" r="30" fill="#FFDD57" opacity="0.9"/>

  <!-- 云朵群 1（左上） -->
  <g opacity="0.85">
    <ellipse cx="150" cy="160" rx="90" ry="35" fill="white"/>
    <ellipse cx="210" cy="145" rx="70" ry="30" fill="white"/>
    <ellipse cx="110" cy="150" rx="55" ry="25" fill="#F5F5F5"/>
  </g>

  <!-- 云朵群 2（右中） -->
  <g opacity="0.7">
    <ellipse cx="550" cy="250" rx="100" ry="38" fill="white"/>
    <ellipse cx="620" cy="235" rx="75" ry="32" fill="white"/>
    <ellipse cx="500" cy="245" rx="60" ry="28" fill="#F5F5F5"/>
  </g>

  <!-- 云朵群 3（左下远处） -->
  <g opacity="0.5">
    <ellipse cx="100" cy="400" rx="120" ry="30" fill="white"/>
    <ellipse cx="180" cy="390" rx="80" ry="25" fill="white"/>
  </g>

  <!-- 远景山丘（淡绿色） -->
  <path d="M0 550 Q200 440 400 500 Q600 430 800 520 L800 600 L0 600Z" fill="#C8E6C9" opacity="0.4"/>
  <path d="M0 580 Q150 520 350 560 Q550 510 800 570 L800 620 L0 620Z" fill="#A5D6A7" opacity="0.3"/>
</svg>
