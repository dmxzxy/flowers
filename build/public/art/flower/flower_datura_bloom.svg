<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Datura bloom - large trumpet-shaped flower -->
  <!-- Stem -->
  <path d="M128 220 Q126 175 128 115" stroke="#2E7D32" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Dark leaves -->
  <ellipse cx="105" cy="180" rx="25" ry="9" fill="#2E7D32" transform="rotate(-30 105 180)"/>
  <ellipse cx="151" cy="170" rx="23" ry="8" fill="#2E7D32" transform="rotate(22 151 170)"/>
  <ellipse cx="110" cy="155" rx="20" ry="7" fill="#388E3C" transform="rotate(-18 110 155)"/>
  <!-- Trumpet flower - large bell shape opening upward -->
  <!-- Outer trumpet -->
  <path d="M90 75 Q95 110 128 115 Q161 110 166 75" fill="none" stroke="#6A0DAD" stroke-width="3"/>
  <path d="M90 75 Q95 110 128 115 Q161 110 166 75 Q155 55 128 50 Q101 55 90 75 Z" fill="#6A0DAD" opacity="0.85"/>
  <!-- Inner trumpet shading -->
  <path d="M98 78 Q102 105 128 110 Q154 105 158 78 Q150 62 128 58 Q106 62 98 78 Z" fill="#9B59B6" opacity="0.7"/>
  <!-- Trumpet rim flare - 5 pointed tips -->
  <path d="M90 75 Q85 65 80 58" stroke="#7B1FA2" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M166 75 Q171 65 176 58" stroke="#7B1FA2" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M100 68 Q92 55 88 45" stroke="#7B1FA2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M156 68 Q164 55 168 45" stroke="#7B1FA2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M128 55 Q128 42 128 35" stroke="#7B1FA2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Center glow -->
  <ellipse cx="128" cy="90" rx="12" ry="8" fill="#D8B4FE" opacity="0.5"/>
  <!-- Stamen -->
  <path d="M128 105 Q128 88 128 78" stroke="#FFD700" stroke-width="1.5" fill="none"/>
  <circle cx="128" cy="76" r="3" fill="#FFD700"/>
</svg>