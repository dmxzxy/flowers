  <ellipse cx="108" cy="170" rx="22" ry="8" fill="#6B8E6B" transform="rotate(-20 108 170)"/>
  <ellipse cx="148" cy="165" rx="20" ry="7" fill="#6B8E6B" transform="rotate(15 148 165)"/>
  <!-- Compact bud with layered feel -->
  <ellipse cx="128" cy="120" rx="14" ry="20" fill="#E0F0FF" opacity="0.8"/>
  <ellipse cx="122" cy="118" rx="10" ry="17" fill="#B0D4F1" opacity="0.6" transform="rotate(-8 122 118)"/>
  <ellipse cx="134" cy="118" rx="10" ry="17" fill="#B0D4F1" opacity="0.6" transform="rotate(8 134 118)"/>
  <!-- Frost sparkles -->
  <circle cx="128" cy="112" r="2" fill="#F0F8FF" opacity="0.8"/>
